<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>Mufasa Bingo - ሙሉ ጨዋታ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fffdf5; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; max-width: 500px; margin: 20px auto; }
        .card-num { border: 1px solid #ccc; padding: 10px; cursor: pointer; background: white; border-radius: 5px; }
        .selected { background: #7986cb; color: white; }
        #timer { font-size: 1.5em; font-weight: bold; color: #e65100; margin: 20px; }
        
        /* የቢንጎ ካርድ ዲዛይን (ከቀድሞው) */
        .bingo-card { border: 2px solid #aaa; width: 320px; margin: 20px auto; display: none; }
        .header { display: flex; background-color: #fca11a; }
        .letter { flex: 1; padding: 10px; font-weight: bold; color: white; }
        .cells { display: grid; grid-template-columns: repeat(5, 1fr); background: white; }
        .cell { border: 1px solid #ddd; padding: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="selection-page">
        <h1>Mufasa Bingo</h1>
        <div id="timer">በ 35 ሰከንድ ይጀምራል...</div>
        <p>የሚጫወቱበትን ካርድ ይምረጡ (1-500)</p>
        <div id="card-selection" class="grid"></div>
    </div>

    <div id="game-page" class="bingo-card">
        <div class="header">
            <div class="letter">B</div><div class="letter">I</div><div class="letter">N</div><div class="letter">G</div><div class="letter">O</div>
        </div>
        <div id="bingo-grid" class="cells"></div>
    </div>

    <script>
        // 1. የካርድ መምረጫ
        const grid = document.getElementById('card-selection');
        for (let i = 1; i <= 500; i++) {
            let div = document.createElement('div');
            div.className = 'card-num';
            div.innerText = i;
            div.onclick = function() {
                document.querySelectorAll('.card-num').forEach(el => el.classList.remove('selected'));
                this.classList.add('selected');
            };
            grid.appendChild(div);
        }

        // 2. የሰዓት ቆጠራና ወደ ጨዋታው መቀየር
        let seconds = 35;
        let timerDisplay = document.getElementById('timer');
        let countdown = setInterval(() => {
            seconds--;
            timerDisplay.innerText = "በ " + seconds + " ሰከንድ ይጀምራል!";
            if (seconds <= 0) {
                clearInterval(countdown);
                document.getElementById('selection-page').style.display = 'none';
                document.getElementById('game-page').style.display = 'block';
                generateBingoNumbers();
            }
        }, 1000);

        // 3. የቢንጎ ቁጥሮች መፍጠሪያ
        function generateBingoNumbers() {
            const bingoGrid = document.getElementById('bingo-grid');
            for (let i = 0; i < 25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = i === 12 ? '★' : Math.floor(Math.random() * 99) + 1;
                bingoGrid.appendChild(cell);
            }
        }
    </script>
</body>
</html>
