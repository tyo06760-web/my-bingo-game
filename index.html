<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>GASHENA BINGO</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2e7d32; color: white; padding: 10px; }
        .box { border: 2px solid #ffcc80; padding: 15px; margin: 10px auto; max-width: 350px; background: #388e3c; border-radius: 10px; }
        .grid-select { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; max-width: 500px; margin: 20px auto; }
        .user-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 300px; margin: 20px auto; }
        .card-num, .user-cell { border: 1px solid #fff; padding: 10px; cursor: pointer; border-radius: 5px; }
        .card-num { background: #1b5e20; }
        .user-cell { background: #fff; color: black; font-weight: bold; }
        .selected { background: #ffeb3b !important; color: black; }
        .marked { background: #ffeb3b !important; }
        .ball { display: inline-block; width: 60px; height: 60px; line-height: 60px; border-radius: 50%; background: white; color: black; font-weight: bold; font-size: 1.2em; border: 3px solid #ccc; }
        #game-area { display: none; }
    </style>
</head>
<body>

    <div id="main-page">
        <h1>GASHENA BINGO</h1>
        <div class="box">
            ሒሳብ: <span id="balance">10</span> ብር | <button onclick="deposit()">Deposit</button>
        </div>
        <button onclick="joinGame()" style="padding:15px; font-size:18px; cursor:pointer;">ጨዋታውን ይቀላቀሉ (-2 ብር)</button>
        <h3>ካርድዎን ይምረጡ (1-500):</h3>
        <div id="card-selection" class="grid-select"></div>
    </div>

    <div id="game-area">
        <h1>GASHENA BINGO</h1>
        <h3>የተጠራ: <span id="called-ball" class="ball">-</span></h3>
        <h3>የእርስዎ ካርድ:</h3>
        <div id="user-card" class="user-grid"></div>
        <h2 id="win-message"></h2>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('balance')) || 10;
        let selectedCard = null;
        document.getElementById('balance').innerText = balance;

        const grid = document.getElementById('card-selection');
        for (let i = 1; i <= 500; i++) {
            let div = document.createElement('div');
            div.className = 'card-num';
            div.innerText = i;
            div.onclick = function() {
                document.querySelectorAll('.card-num').forEach(el => el.classList.remove('selected'));
                this.classList.add('selected');
                selectedCard = i;
            };
            grid.appendChild(div);
        }

        function deposit() {
            let message = "ክፍያ በቴሌብር (Telebirr) ብቻ!\nቁጥር: 0939532888\nስም: Tedros\n\nመጠን ያስገቡ:";
            let amount = prompt(message);
            if(amount && !isNaN(amount)) { 
                balance += parseInt(amount); 
                localStorage.setItem('balance', balance); 
                document.getElementById('balance').innerText = balance;
                alert("ክፍያዎ ተመዝግቧል!");
            }
        }

        function joinGame() {
            if(!selectedCard) { alert("እባክዎ መጀመሪያ ካርድ ይምረጡ!"); return; }
            if(balance >= 2) {
                balance -= 2;
                localStorage.setItem('balance', balance);
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                
                const userCard = document.getElementById('user-card');
                for(let i=0; i<25; i++) {
                    let num = Math.floor(Math.random() * 75) + 1;
                    let div = document.createElement('div');
                    div.className = 'user-cell';
                    div.innerText = num;
                    div.onclick = function() { this.classList.add('marked'); checkWin(); };
                    userCard.appendChild(div);
                }
                startCaller();
            } else { alert("ሒሳብዎ በቂ አይደለም!"); }
        }

        function startCaller() {
            setInterval(() => {
                let num = Math.floor(Math.random() * 75) + 1;
                document.getElementById('called-ball').innerText = num;
            }, 3000);
        }

        function checkWin() {
            let cells = document.querySelectorAll('.user-cell');
            let board = [];
            for(let i=0; i<25; i++) {
                board.push(cells[i].classList.contains('marked'));
            }

            let won = false;

            // 1. አግድም (Rows)
            for(let r=0; r<5; r++) {
                if(board.slice(r*5, r*5+5).every(val => val)) won = true;
            }
            // 2. ቀጥታ (Columns)
            for(let c=0; c<5; c++) {
                if([board[c], board[c+5], board[c+10], board[c+15], board[c+20]].every(val => val)) won = true;
            }
            // 3. ዲያጎናል (Diagonals)
            if([board[0], board[6], board[12], board[18], board[24]].every(val => val)) won = true;
            if([board[4], board[8], board[12], board[16], board[20]].every(val => val)) won = true;
            // 4. ጠርዝ (Edges)
            let edges = [0,1,2,3,4, 5,9, 10,14, 15,19, 20,21,22,23,24];
            if(edges.every(idx => board[idx])) won = true;

            if(won) {
                document.getElementById('win-message').innerText = "BINGO! GASHENA WINNER!";
            }
        }
    </script>
</body>
</html>
