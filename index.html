<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>GASHENA BINGO</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2e7d32; color: white; padding: 10px; }
        .box { border: 2px solid #ffcc80; padding: 15px; margin: 10px auto; max-width: 350px; background: #388e3c; border-radius: 10px; }
        .grid-select { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; max-width: 500px; margin: 20px auto; }
        .user-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; max-width: 300px; margin: 10px auto; }
        .bingo-header { font-weight: bold; background: #1b5e20; padding: 5px; border: 1px solid #fff; }
        .card-num, .user-cell { border: 1px solid #fff; padding: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .card-num { background: #1b5e20; }
        .user-cell { background: #fff; color: black; height: 40px; display: flex; align-items: center; justify-content: center; }
        .selected { background: #ffeb3b !important; color: black; }
        .marked { background: #ffeb3b !important; color: black; border: 2px solid red; }
        .free-space { background: #ffd54f !important; }
        .ball { display: inline-block; width: 80px; height: 60px; line-height: 60px; border-radius: 10px; background: white; color: black; font-weight: bold; font-size: 1.2em; border: 3px solid #ccc; }
        #game-area { display: none; }
    </style>
</head>
<body>

    <div id="main-page">
        <h1>GASHENA BINGO</h1>
        <div class="box">
            ሒሳብ: <span id="balance">10</span> ብር | <button onclick="deposit()">Deposit</button>
        </div>
        <div class="box">
            ተጫዋቾች: <span id="player-count">1</span> | ደራሽ (Pot): <span id="pot-amount">0</span> ብር
        </div>
        <button onclick="joinGame()" style="padding:15px; font-size:18px; cursor:pointer;">ጨዋታውን ይቀላቀሉ (-2 ብር)</button>
        <h3>ካርድዎን ይምረጡ (1-500):</h3>
        <div id="card-selection" class="grid-select"></div>
    </div>

    <div id="game-area">
        <h1>GASHENA BINGO</h1>
        <h3>የተጠራ: <span id="called-ball" class="ball">-</span></h3>
        <div id="user-card" class="user-grid"></div>
        <h2 id="win-message"></h2>
        <button onclick="location.reload()" style="padding:10px; cursor:pointer;">ወደ መጀመሪያው ተመለስ</button>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('balance')) || 10;
        let pot = 0;
        let playerCount = 1;
        let selectedCard = null;
        document.getElementById('balance').innerText = balance;

        // 1. ካርድ መምረጫ
        const grid = document.getElementById('card-selection');
        for (let i = 1; i <= 500; i++) {
            let div = document.createElement('div');
            div.className = 'card-num';
            div.innerText = i;
            div.onclick = function() {
                document.querySelectorAll('.card-num').forEach(el => el.classList.remove('selected'));
                this.classList.add('selected');
                selectedCard = i;
            };
            grid.appendChild(div);
        }

        function deposit() {
            let amount = prompt("ክፍያ በቴሌብር (0939532888 - Tedros) | መጠን ያስገቡ:");
            if(amount && !isNaN(amount)) { 
                balance += parseInt(amount); 
                localStorage.setItem('balance', balance); 
                document.getElementById('balance').innerText = balance;
                alert("ክፍያዎ ተመዝግቧል!");
            }
        }

        function joinGame() {
            if(!selectedCard) { alert("እባክዎ ካርድ ይምረጡ!"); return; }
            if(balance >= 2) {
                balance -= 2; pot += 2; playerCount++;
                document.getElementById('balance').innerText = balance;
                document.getElementById('pot-amount').innerText = pot;
                document.getElementById('player-count').innerText = playerCount;
                
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                
                const userCard = document.getElementById('user-card');
                const headers = ['B', 'I', 'N', 'G', 'O'];
                const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                
                headers.forEach(h => {
                    let div = document.createElement('div');
                    div.className = 'bingo-header';
                    div.innerText = h;
                    userCard.appendChild(div);
                });

                for(let col=0; col<5; col++) {
                    for(let row=0; row<5; row++) {
                        let div = document.createElement('div');
                        div.className = 'user-cell';
                        if(row === 2 && col === 2) {
                            div.innerText = "FREE";
                            div.classList.add('marked', 'free-space');
                        } else {
                            let min = ranges[col][0];
                            let max = ranges[col][1];
                            div.innerText = Math.floor(Math.random() * (max - min + 1)) + min;
                            div.onclick = function() { this.classList.add('marked'); checkWin(); };
                        }
                        userCard.appendChild(div);
                    }
                }
                startCaller();
            } else { alert("ሒሳብዎ በቂ አይደለም!"); }
        }

        function startCaller() {
            setInterval(() => {
                const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                const letters = ['B', 'I', 'N', 'G', 'O'];
                let col = Math.floor(Math.random() * 5);
                let num = Math.floor(Math.random() * (ranges[col][1] - ranges[col][0] + 1)) + ranges[col][0];
                document.getElementById('called-ball').innerText = letters[col] + num;
            }, 3000);
        }

        function checkWin() {
            let cells = document.querySelectorAll('.user-cell');
            let b = Array.from(cells).map(c => c.classList.contains('marked'));
            let won = false;
            // 25 cell total (0 to 24)
            for(let i=0; i<5; i++) {
                if(b.slice(i*5, i*5+5).every(v => v)) won = true;
                if([b[i], b[i+5], b[i+10], b[i+15], b[i+20]].every(v => v)) won = true;
            }
            if([b[0], b[6], b[12], b[18], b[24]].every(v => v)) won = true;
            if([b[4], b[8], b[12], b[16], b[20]].every(v => v)) won = true;
            let e = [0,1,2,3,4, 5,9, 10,14, 15,19, 20,21,22,23,24];
            if(e.every(idx => b[idx])) won = true;
            if(won) document.getElementById('win-message').innerText = "BINGO! GASHENA WINNER!";
        }
    </script>
</body>
</html>
