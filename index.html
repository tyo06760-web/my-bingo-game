<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>GASHENA BINGO</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2e7d32; color: white; padding: 10px; }
        .box { border: 2px solid #ffcc80; padding: 15px; margin: 10px auto; max-width: 350px; background: #388e3c; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; max-width: 500px; margin: 20px auto; }
        .card-num { border: 1px solid #fff; padding: 10px; cursor: pointer; background: #1b5e20; border-radius: 5px; }
        .selected { background: #ffeb3b !important; color: black; }
        .ball { display: inline-block; width: 60px; height: 60px; line-height: 60px; border-radius: 50%; background: white; color: black; font-weight: bold; font-size: 1.2em; margin: 10px; border: 3px solid #ccc; }
        table { margin: 20px auto; border-collapse: collapse; background: white; color: black; }
        th, td { border: 1px solid #ddd; padding: 8px; width: 40px; }
        th { background: #1b5e20; color: white; }
        .highlight { background: #ffeb3b !important; font-weight: bold; }
        #game-area { display: none; }
    </style>
</head>
<body>

    <div id="main-page" style="display:block;">
        <h1>GASHENA BINGO</h1>
        <div class="box">
            ሒሳብ: <span id="balance">0</span> ብር | 
            <button onclick="deposit()">Deposit</button>
        </div>
        <div class="box">
            <p>ተጫዋቾች: <span id="player-count">0</span></p>
            <p>ደራሽ (Pot): <span id="pot-amount">0</span> ብር</p>
        </div>
        <button onclick="joinGame()" style="padding:15px; font-size:18px; cursor:pointer;">ጨዋታውን ይቀላቀሉ (-2 ብር)</button>
        <h3>ካርድዎን ይምረጡ (1-500):</h3>
        <div id="card-selection" class="grid"></div>
    </div>

    <div id="game-area">
        <h1>GASHENA BINGO</h1>
        <h3>የተጠራ ኳስ: <span id="called-ball" class="ball">-</span></h3>
        <table id="history-table">
            <tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
        </table>
    </div>

    <script>
        // 1. የ10 ብር ቦነስ አሰራር
        let balance = parseInt(localStorage.getItem('balance'));
        if (isNaN(balance)) {
            balance = 10; // ለመጀመሪያ ጊዜ ለተጠቃሚው 10 ብር ይሰጣል
            localStorage.setItem('balance', balance);
        }
        document.getElementById('balance').innerText = balance;

        let pot = 0;
        let playerCount = 0;
        let selectedCard = null;

        const grid = document.getElementById('card-selection');
        for (let i = 1; i <= 500; i++) {
            let div = document.createElement('div');
            div.className = 'card-num';
            div.innerText = i;
            div.onclick = function() {
                document.querySelectorAll('.card-num').forEach(el => el.classList.remove('selected'));
                this.classList.add('selected');
                selectedCard = i;
            };
            grid.appendChild(div);
        }

        const table = document.getElementById('history-table');
        for(let i=1; i<=15; i++) {
            let row = table.insertRow();
            for(let j=0; j<5; j++) {
                let cell = row.insertCell();
                let num = (j * 15) + i;
                cell.innerText = num;
                cell.id = 'cell-' + num;
            }
        }

        function deposit() {
            let myName = "Tedros"; 
            let myPhone = "0939532888"; 
            let message = "ክፍያ የሚፈጸመው በቴሌብር (Telebirr) ብቻ ነው!\n\nቁጥር: " + myPhone + "\nስም: " + myName + "\n\nመሙላት የሚፈልጉትን መጠን ያስገቡ:";
            let amount = prompt(message);
            if(amount && !isNaN(amount)) { 
                balance += parseInt(amount); 
                localStorage.setItem('balance', balance); 
                document.getElementById('balance').innerText = balance;
                alert("ክፍያዎ ተመዝግቧል!");
            }
        }

        function joinGame() {
            if(!selectedCard) { alert("እባክዎ መጀመሪያ ካርድ ይምረጡ!"); return; }
            if(balance >= 2) {
                balance -= 2; 
                pot += 2; 
                playerCount++;
                localStorage.setItem('balance', balance);
                document.getElementById('balance').innerText = balance;
                document.getElementById('pot-amount').innerText = pot;
                document.getElementById('player-count').innerText = playerCount;
                
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('game-area').style.display = 'block';
                startCaller();
            } else {
                alert("ሒሳብዎ በቂ አይደለም! እባክዎ Deposit ያድርጉ።");
            }
        }

        function startCaller() {
            setInterval(() => {
                let letterIndex = Math.floor(Math.random() * 5);
                let letter = ['B', 'I', 'N', 'G', 'O'][letterIndex];
                let num = Math.floor(Math.random() * 15) + 1 + (letterIndex * 15);
                document.getElementById('called-ball').innerText = letter + num;
                let cell = document.getElementById('cell-' + num);
                if(cell) cell.classList.add('highlight');
            }, 3000);
        }
    </script>
</body>
</html>
