<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የ Tedros ቢንጎ ጨዋታ</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .header { margin-bottom: 20px; }
        .logo { width: 120px; margin-bottom: 10px; }
        .lobby { margin: 20px 0; }
        .card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 20px auto; width: 320px; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .cell { border: 1px solid #ddd; padding: 15px 5px; text-align: center; font-weight: bold; }
        .star { background-color: #ff9800; color: white; border-radius: 5px; }
        button { padding: 12px 20px; margin: 5px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <h1>የ Tedros ቢንጎ</h1>
        <button onclick="showWallet()">የእኔ ቴሌብር አካውንት</button>
        <p>ቀሪ ሂሳብዎ: <span id="balance">50</span> ብር</p>
    </div>

    <div class="lobby">
        <button onclick="enterGame(10)">ባለ 10 ብር ጨዋታ</button>
        <button onclick="enterGame(20)">ባለ 20 ብር ጨዋታ</button>
    </div>

    <div id="bingo-card" class="card">
        <div class="cell">B</div><div class="cell">I</div><div class="cell">N</div><div class="cell">G</div><div class="cell">O</div>
        </div>

    <button id="bingo-btn" style="display:none;" onclick="checkBingo()">BINGO!</button>

    <script>
        function showWallet() {
            alert("ገንዘብ ለመሙላት ወደዚህ ቴሌብር ይላኩ:\n\n" +
                  "ስም: tedros\n" +
                  "ቁጥር: 0939532888\n\n" +
                  "ላኩ እና Transaction ID-ውን ለAdmin ይላኩ።");
        }

        function enterGame(amount) {
            let balance = parseInt(document.getElementById('balance').innerText);
            if (balance < amount) {
                alert("ቀሪ ሒሳብዎ አነስተኛ ነው!");
            } else {
                document.getElementById('balance').innerText = balance - amount;
                alert("ክፍያ ተቀናንሷል! ጨዋታው በቅርቡ ይጀምራል...");
                document.getElementById('bingo-btn').style.display = "inline-block";
            }
        }

        function checkBingo() {
            alert("ቢንጎው ተረጋገጠ! አሸናፊው እና ካርቴላው እየተጣራ ነው...");
        }
    </script>
</body>
</html>
